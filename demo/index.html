<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>imageview demo</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
      #app { display: flex; flex-direction: column; height: 100%; }
      header { padding: 8px 12px; border-bottom: 1px solid #e4e6eb; display: flex; gap: 12px; align-items: center; }
      header b { font-size: 14px; }
      header label { font-size: 13px; color: #444; cursor: pointer; }
      #viewer { flex: 1 1 auto; min-height: 0; }
      #drop { flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
        color: #667; font-size: 15px; text-align: center; padding: 24px; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <b>imageview</b>
        <label>Open an image <input id="file" type="file" accept="image/*" /></label>
        <span style="color:#889;font-size:12px">or drop one anywhere · everything stays in your browser</span>
      </header>
      <div id="viewer"><div id="drop">Drop an image here (PNG / JPEG / GIF / WebP / SVG …)</div></div>
    </div>
    <script type="module" src="./demo.ts"></script>
  </body>
</html>
